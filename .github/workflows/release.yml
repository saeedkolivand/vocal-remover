name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # 1. semantic-release reads conventional commits, bumps versions (via
  #    scripts/bump-version.mjs), tags, and creates the GitHub Release.
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Only when a release was cut: build signed installers + updater artifacts
  #    on each OS and attach them (incl. latest.json) to that release.
  bundle:
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Freeze the Flask backend into a self-contained sidecar. CPU/MPS torch (not
      # CUDA) keeps it under GitHub's 2GB release-asset limit and works on macOS.
      # The model is NOT bundled — the sidecar downloads it on first run (see app.py).
      # tauri.conf.json bundles sidecar/vr-backend/ as the app's backend/ resource.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build backend sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Windows → DirectML torch: runs the model on ANY GPU (NVIDIA/AMD/Intel) via the
          # dml_hybrid patch (complex STFT on CPU, transformer on the GPU; ~5x over CPU).
          # macOS → CPU/MPS torch. Both fit GitHub's 2GB limit; CUDA is a separate build.
          if [ "$RUNNER_OS" = "Windows" ]; then EXTRA=dml; else EXTRA=cpu; fi
          pip install flask "audio-separator[$EXTRA]" static-ffmpeg pyinstaller
          # static-ffmpeg's wheel ships NO binaries — it lazily downloads ffmpeg/ffprobe
          # on the first add_paths() call. Trigger that download HERE so collect_all bakes
          # them into the sidecar; otherwise the user's first launch fetches ffmpeg into the
          # install dir (fails on read-only installs) and the app hangs on the splash.
          python -c "import static_ffmpeg; static_ffmpeg.add_paths()"
          pyinstaller vr-backend.spec --distpath sidecar --noconfirm

      - name: Resolve release id
        id: rel
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "id=$(gh release view v${{ needs.release.outputs.version }} --json databaseId -q .databaseId)" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ steps.rel.outputs.id }}
