name: build

# Compile-check + unsigned installers on branches/PRs. Releases (tags on main,
# signed + updater artifacts) are handled by release.yml.
on:
  push:
    branches-ignore: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Shell build: drop the sidecar resource (not built here) and skip updater
      # artifacts (those need TAURI_SIGNING_PRIVATE_KEY — release.yml only). The
      # resulting app spawns a local Python backend, which fetches the model.
      - name: Prepare config for shell build
        shell: bash
        run: node -e "const f='src-tauri/tauri.conf.json',fs=require('fs'),j=JSON.parse(fs.readFileSync(f));delete j.bundle.resources;j.bundle.createUpdaterArtifacts=false;fs.writeFileSync(f,JSON.stringify(j,null,2))"

      - name: Build
        run: pnpm exec tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: vocal-remover-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: warn
